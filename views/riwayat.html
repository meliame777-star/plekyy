<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Penjual - Riwayat Pesanan</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f0c0c; --card-dark: #1a1515; --primary-red: #d32f2f; --hot-orange: #ff5722; --text-light: #f5f5f5; --text-muted: #aaaaaa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background-color: #1a1515; border-bottom: 2px solid var(--primary-red); }
        .logo { font-size: 24px; font-weight: 800; text-transform: uppercase; color: white;}
        .logo span { color: var(--primary-red); }
        .btn-logout { background-color: var(--primary-red); color: white; padding: 8px 16px; text-decoration: none; border-radius: 6px; font-weight: 600; }
        .history-container { padding: 40px 8%; }
        .history-container h2 { font-size: 32px; margin-bottom: 30px; text-transform: uppercase; text-align: center; }
        .table-responsive { overflow-x: auto; background-color: var(--card-dark); border-radius: 12px; border: 1px solid #2a2222; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #241d1d; color: var(--hot-orange); padding: 16px; border-bottom: 2px solid var(--primary-red); }
        td { padding: 16px; border-bottom: 1px solid #2a2222; }
        .status { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; background-color: rgba(76, 175, 80, 0.2); color: #81c784; border: 1px solid #4caf50; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">DASHBOARD<span>PENJUAL</span></div>
        <a href="/" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </nav>

    <div class="history-container">
        <h2>Monitor <span>Pesanan Masuk</span></h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Pelanggan</th>
                        <th>Detail Pesanan Masuk</th>
                        <th>Total Pembayaran</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tabel-riwayat">
                   </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/api/riwayat')
                .then(res => res.json())
                .then(data => {
                    const tabelBody = document.getElementById('tabel-riwayat');
                    tabelBody.innerHTML = ''; 

                    if(data.length === 0) {
                        tabelBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding:30px;">Belum ada pesanan masuk dari pembeli.</td></tr>`;
                        return;
                    }

                    data.forEach(row => {
                        tabelBody.innerHTML += `
                            <tr>
                                <td>#${row.id}</td>
                                <td><strong>${row.nama}</strong><br><small style="color:var(--text-muted);">${row.no_hp}</small></td>
                                <td>${row.pesanan}</td>
                                <td style="color:var(--hot-orange); font-weight:700;">Rp ${Number(row.total).toLocaleString('id-ID')}</td>
                                <td><span class="status">${row.status}</span></td>
                            </tr>
                        `;
                    });
                });
        });
    </script>
</body>
</html>
