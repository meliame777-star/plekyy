<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Penjual - Level Pedas</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0c0c; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: #1a1515; padding: 40px; border-radius: 12px; border: 1px solid #d32f2f; box-shadow: 0 0 20px rgba(211,47,47,0.3); text-align: center; width: 350px; }
        h2 { color: #ff5722; margin-bottom: 25px; text-transform: uppercase; font-size: 22px; }
        h2 span { color: #d32f2f; }
        input { width: 100%; padding: 12px; margin: 10px 0; background-color: #241d1d; border: 1px solid #3a2e2e; color: white; border-radius: 6px; outline: none; box-sizing: border-box; }
        input:focus { border-color: #ff5722; }
        button { width: 100%; padding: 12px; background: linear-gradient(45deg, #d32f2f, #ff5722); border: none; color: white; font-weight: 700; border-radius: 6px; cursor: pointer; margin-top: 15px; font-size: 15px; }
        button:hover { opacity: 0.9; }
        .back-link { display: inline-block; margin-top: 20px; color: #aaa; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .back-link:hover { color: #ff5722; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Toko <span>Penjual</span></h2>
        <!-- Menggunakan tag form agar lebih standar dan aman -->
        <form id="formLogin">
            <input type="text" id="username" placeholder="Username Penjual" required>
            <input type="password" id="password" placeholder="Password Rahasia" required>
            <button type="submit">Masuk Sistem</button>
        </form>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah form melakukan refresh otomatis yang memicu Cannot GET

            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert('Selamat datang kembali, Owner Plekyy! 🌶️');
                    window.location.href = '/dashboard'; // Diarahkan ke riwayat pesanan penjual
                } else {
                    alert(data.message);
                }
            })
            .catch(err => {
                console.error('Error:', err);
                alert('Gagal terhubung ke server backend.');
            });
        });
    </script>
</body>
</html>
